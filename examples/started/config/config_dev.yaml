# 环境变量
env: dev

# 应用配置
application:
  name: share-go-demo

# 服务器配置
server:
  port: 3002
  prefix: /api/v1

  # 数据验证器配置
  validator:
    enable: false

  # 系统日志打印
  logging:
    enable: true

data:
  # 数据库配置
  mongodb:
    -
      timeout: 5
      name: dashboard
      min-pool-size: 5
      max-pool-size: 20
      max-connecting: 5
      uri: mongodb://127.0.0.1:27017/ShareGo
    -
      timeout: 5
      name: logging
      min-pool-size: 5
      max-pool-size: 20
      max-connecting: 5
      uri: mongodb://127.0.0.1:27017/ShareGo
    -
      timeout: 5
      name: tubemax
      min-pool-size: 5
      max-pool-size: 20
      max-connecting: 5
      uri: mongodb://127.0.0.1:27017/ShareGo

  # redis配置
  redis:
    -
      host: 127.0.0.1:6379
      password:
      db: 0

# 日志配置
logger:
  path: ./log
  level: DEBUG